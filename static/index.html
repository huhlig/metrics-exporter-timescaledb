<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        h1 {
            color: #00d9ff;
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            color: #888;
            font-size: 14px;
        }
        select, input, button {
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #16213e;
            color: #fff;
            font-size: 14px;
        }
        select {
            min-width: 200px;
        }
        input[type="datetime-local"] {
            width: 220px;
        }
        button {
            background: #00d9ff;
            color: #000;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #00b8d9;
        }
        .chart-container {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-wrapper {
            position: relative;
            height: 400px;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d9ff;
            font-size: 18px;
        }
        .error {
            background: #3d1f1f;
            border: 1px solid #ff4444;
            color: #ff6666;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d9ff;
        }
        .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Metrics Dashboard</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="metricSelect">Metric:</label>
                    <select id="metricSelect">
                        <option value="">Select a metric...</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="intervalSelect">Interval:</label>
                    <select id="intervalSelect">
                        <option value="1m">1 minute</option>
                        <option value="5m">5 minutes</option>
                        <option value="1h" selected>1 hour</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="startTime">From:</label>
                    <input type="datetime-local" id="startTime">
                </div>
                <div class="control-group">
                    <label for="endTime">To:</label>
                    <input type="datetime-local" id="endTime">
                </div>
                <button id="refreshBtn">Refresh</button>
            </div>
        </header>

        <div id="errorContainer"></div>

        <div class="stats" id="statsContainer" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="statCount">-</div>
                <div class="stat-label">Data Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMin">-</div>
                <div class="stat-label">Min Value</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMax">-</div>
                <div class="stat-label">Max Value</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statAvg">-</div>
                <div class="stat-label">Avg Value</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-wrapper">
                <canvas id="metricsChart"></canvas>
                <div class="loading" id="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        let chart = null;
        let metrics = [];

        function formatDateTimeLocal(date) {
            const d = new Date(date);
            return d.toISOString().slice(0, 16);
        }

        function showError(message) {
            document.getElementById('errorContainer').innerHTML = 
                `<div class="error">${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function updateStats(data) {
            if (!data.aggregates || data.aggregates.length === 0) {
                document.getElementById('statsContainer').style.display = 'none';
                return;
            }

            document.getElementById('statsContainer').style.display = 'grid';
            
            const values = data.aggregates
                .map(a => a.avg)
                .filter(v => v !== null && v !== undefined);
            
            const count = values.length;
            const min = values.length ? Math.min(...values).toFixed(2) : '-';
            const max = values.length ? Math.max(...values).toFixed(2) : '-';
            const avg = values.length ? (values.reduce((a, b) => a + b, 0) / values.length).toFixed(2) : '-';

            document.getElementById('statCount').textContent = count;
            document.getElementById('statMin').textContent = min;
            document.getElementById('statMax').textContent = max;
            document.getElementById('statAvg').textContent = avg;
        }

        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/metrics`);
                if (!response.ok) throw new Error('Failed to load metrics');
                const data = await response.json();
                
                metrics = data.metrics || [];
                const select = document.getElementById('metricSelect');
                
                select.innerHTML = '<option value="">Select a metric...</option>';
                metrics.forEach(metric => {
                    const option = document.createElement('option');
                    option.value = metric;
                    option.textContent = metric;
                    select.appendChild(option);
                });
            } catch (error) {
                showError('Failed to load metrics list: ' + error.message);
            }
        }

        async function loadChart() {
            const metricName = document.getElementById('metricSelect').value;
            if (!metricName) {
                showError('Please select a metric');
                return;
            }

            clearError();
            showLoading(true);

            const interval = document.getElementById('intervalSelect').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;

            let url = `${API_BASE}/metrics/${encodeURIComponent(metricName)}/aggregated?interval=${interval}`;
            if (start) url += `&start=${new Date(start).toISOString()}`;
            if (end) url += `&end=${new Date(end).toISOString()}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load data');
                const data = await response.json();

                updateStats(data);

                const chartData = {
                    labels: (data.aggregates || []).map(a => a.bucket),
                    datasets: [{
                        label: `${metricName} (${data.interval})`,
                        data: (data.aggregates || []).map(a => a.avg),
                        borderColor: '#00d9ff',
                        backgroundColor: 'rgba(0, 217, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    }]
                };

                if (chart) {
                    chart.data = chartData;
                    chart.update();
                } else {
                    const ctx = document.getElementById('metricsChart').getContext('2d');
                    chart = new Chart(ctx, {
                        type: 'line',
                        data: chartData,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: {
                                intersect: false,
                                mode: 'index'
                            },
                            scales: {
                                x: {
                                    type: 'time',
                                    time: {
                                        unit: data.interval === '1m' ? 'minute' : data.interval === '5m' ? 'hour' : 'day'
                                    },
                                    grid: {
                                        color: '#333'
                                    },
                                    ticks: {
                                        color: '#888'
                                    }
                                },
                                y: {
                                    grid: {
                                        color: '#333'
                                    },
                                    ticks: {
                                        color: '#888'
                                    }
                                }
                            },
                            plugins: {
                                legend: {
                                    labels: {
                                        color: '#eee'
                                    }
                                },
                                tooltip: {
                                    backgroundColor: '#16213e',
                                    titleColor: '#00d9ff',
                                    bodyColor: '#eee',
                                    borderColor: '#333',
                                    borderWidth: 1
                                }
                            }
                        }
                    });
                }
            } catch (error) {
                showError('Failed to load chart data: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function initializeDefaults() {
            const now = new Date();
            const dayAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            
            document.getElementById('endTime').value = formatDateTimeLocal(now);
            document.getElementById('startTime').value = formatDateTimeLocal(dayAgo);
        }

        document.getElementById('metricSelect').addEventListener('change', loadChart);
        document.getElementById('intervalSelect').addEventListener('change', loadChart);
        document.getElementById('refreshBtn').addEventListener('click', loadChart);

        initializeDefaults();
        loadMetrics();
    </script>
</body>
</html>
