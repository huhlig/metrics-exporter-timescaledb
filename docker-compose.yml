services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: metrics-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-password}
      POSTGRES_DB: metrics
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metrics-app
    environment:
      DATABASE_URL: postgres://postgres:${TIMESCALEDB_PASSWORD:-password}@timescaledb:5432/metrics
      RUST_LOG: info
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  timescaledb_data:
